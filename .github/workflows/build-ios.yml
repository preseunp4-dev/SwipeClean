name: Build iOS & Submit to TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: SwipeClean

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SwipeClean/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Fastlane
        run: brew install fastlane

      - name: Install CocoaPods
        run: brew install cocoapods

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS locally
        run: eas build --platform ios --local --non-interactive --output ./build.ipa

      - name: Submit to TestFlight
        run: eas submit --platform ios --path ./build.ipa --non-interactive --no-wait
