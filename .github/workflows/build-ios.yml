name: Build iOS & Submit to TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    # macos-26 (Tahoe) ships with Xcode 26 / iOS 26 SDK, which Apple now
    # requires for all TestFlight uploads (rule went live ~April 2026).
    # macos-latest currently still maps to macos-15 / Xcode 16 / iOS 18.5
    # SDK and gets rejected by Apple with a STATE_ERROR.VALIDATION_ERROR.
    runs-on: macos-26
    timeout-minutes: 60
    defaults:
      run:
        working-directory: SwipeClean

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SwipeClean/package-lock.json

      # Belt-and-suspenders: even on macos-26, multiple Xcodes are installed.
      # Force the latest stable so we get Xcode 26 with the iOS 26 SDK.
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install dependencies
        run: npm ci

      - name: Install Fastlane
        run: brew install fastlane

      - name: Install CocoaPods
        run: brew install cocoapods

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS locally
        run: eas build --platform ios --local --non-interactive --output ./build.ipa

      - name: Submit to TestFlight
        run: eas submit --platform ios --path ./build.ipa --non-interactive --no-wait
